<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Generator — Free Secure Password Tool</title>
    <meta name="description" content="Generate strong, secure passwords instantly. Free online password generator with customizable length and character options." />
    <style>
        /* ---------- RESET & BASE ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, #0b1120 0%, #1a2332 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* ---------- CARD ---------- */
        .container {
            background: #1e293b;
            padding: 40px 35px;
            border-radius: 28px;
            max-width: 520px;
            width: 100%;
            box-shadow: 0 25px 50px -8px rgba(0, 0, 0, 0.8);
            border: 1px solid #334155;
            transition: 0.3s;
        }

        h1 {
            color: #f1f5f9;
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h1 span {
            background: #3b82f6;
            font-size: 20px;
            padding: 2px 12px;
            border-radius: 30px;
            color: #fff;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 28px;
            border-left: 4px solid #3b82f6;
            padding-left: 14px;
        }

        /* ---------- PASSWORD DISPLAY ---------- */
        .password-box {
            background: #0f172a;
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid #334155;
            transition: 0.3s;
            margin-bottom: 10px;
        }

        .password-box:focus-within {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        #passwordDisplay {
            background: transparent;
            border: none;
            outline: none;
            color: #e2e8f0;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 1px;
            width: 100%;
            font-family: 'Courier New', monospace;
        }

        #passwordDisplay::placeholder {
            color: #475569;
            font-weight: 400;
            letter-spacing: 0;
            font-family: 'Segoe UI', sans-serif;
            font-size: 15px;
        }

        .copy-btn {
            background: #3b82f6;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
            white-space: nowrap;
            margin-left: 12px;
        }

        .copy-btn:hover {
            background: #2563eb;
            transform: scale(1.03);
        }

        .copy-btn:active {
            transform: scale(0.96);
        }

        /* ---------- STRENGTH BAR ---------- */
        .strength-section {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 26px;
            margin-top: 6px;
        }

        .strength-bar {
            flex: 1;
            height: 6px;
            background: #334155;
            border-radius: 10px;
            overflow: hidden;
        }

        #strengthFill {
            height: 100%;
            width: 0%;
            border-radius: 10px;
            transition: width 0.4s ease, background 0.4s ease;
            background: #ef4444;
        }

        #strengthLabel {
            color: #94a3b8;
            font-size: 13px;
            font-weight: 500;
            min-width: 56px;
            text-align: right;
        }

        /* ---------- CONTROLS ---------- */
        .control-group {
            margin-bottom: 22px;
        }

        .control-group label {
            display: flex;
            justify-content: space-between;
            color: #cbd5e1;
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 6px;
        }

        .control-group label span {
            color: #3b82f6;
            font-weight: 700;
            font-size: 18px;
        }

        input[type="range"] {
            width: 100%;
            height: 5px;
            -webkit-appearance: none;
            background: #334155;
            border-radius: 10px;
            outline: none;
            transition: 0.3s;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #3b82f6;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.4);
            transition: 0.2s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.12);
        }

        /* ---------- CHECKBOXES ---------- */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px 18px;
            margin: 16px 0 24px 0;
        }

        .options-grid label {
            color: #e2e8f0;
            font-size: 14px;
            font-weight: 450;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .options-grid input[type="checkbox"] {
            width: 17px;
            height: 17px;
            accent-color: #3b82f6;
            cursor: pointer;
            flex-shrink: 0;
        }

        /* ---------- GENERATE BUTTON ---------- */
        .generate-btn {
            width: 100%;
            padding: 15px;
            background: #3b82f6;
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }

        .generate-btn:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 12px 28px -8px rgba(59, 130, 246, 0.4);
        }

        .generate-btn:active {
            transform: translateY(0px);
        }

        /* ---------- FOOTER ---------- */
        .footer {
            margin-top: 24px;
            text-align: center;
            color: #475569;
            font-size: 12px;
            border-top: 1px solid #1e293b;
            padding-top: 18px;
        }

        .footer a {
            color: #64748b;
            text-decoration: none;
            transition: 0.3s;
        }

        .footer a:hover {
            color: #94a3b8;
        }

        /* ---------- RESPONSIVE ---------- */
        @media (max-width: 480px) {
            .container {
                padding: 24px 18px;
            }

            h1 {
                font-size: 21px;
            }

            #passwordDisplay {
                font-size: 17px;
            }

            .options-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .copy-btn {
                padding: 6px 12px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- HEADER -->
        <h1>
            🔐 Pass<span>Gen</span>
        </h1>
        <div class="subtitle">Generate strong passwords instantly</div>

        <!-- PASSWORD DISPLAY -->
        <div class="password-box">
            <input type="text" id="passwordDisplay" placeholder="Click Generate" readonly />
            <button class="copy-btn" id="copyBtn">📋 Copy</button>
        </div>

        <!-- STRENGTH -->
        <div class="strength-section">
            <span style="color:#94a3b8; font-size:13px; font-weight:500;">Strength</span>
            <div class="strength-bar">
                <div id="strengthFill" style="width:0%;"></div>
            </div>
            <span id="strengthLabel">Weak</span>
        </div>

        <!-- LENGTH SLIDER -->
        <div class="control-group">
            <label>
                Password Length
                <span id="lengthDisplay">12</span>
            </label>
            <input type="range" id="lengthSlider" min="4" max="32" value="12" />
        </div>

        <!-- OPTIONS -->
        <div class="options-grid">
            <label><input type="checkbox" id="uppercase" checked /> A–Z (Uppercase)</label>
            <label><input type="checkbox" id="lowercase" checked /> a–z (Lowercase)</label>
            <label><input type="checkbox" id="numbers" checked /> 0–9 (Numbers)</label>
            <label><input type="checkbox" id="symbols" checked /> !@#$ (Symbols)</label>
        </div>

        <!-- GENERATE BUTTON -->
        <button class="generate-btn" id="generateBtn">⚡ Generate Password</button>

        <div class="footer">
            Made with ❤️ &bull; Free &amp; Secure
        </div>

    </div>

    <!-- ============================================================ -->
    <!-- JAVASCRIPT -->
    <script>
        (function() {
            'use strict';

            // ----- DOM refs -----
            const passwordDisplay = document.getElementById('passwordDisplay');
            const lengthSlider = document.getElementById('lengthSlider');
            const lengthDisplay = document.getElementById('lengthDisplay');
            const uppercaseChk = document.getElementById('uppercase');
            const lowercaseChk = document.getElementById('lowercase');
            const numbersChk = document.getElementById('numbers');
            const symbolsChk = document.getElementById('symbols');
            const generateBtn = document.getElementById('generateBtn');
            const copyBtn = document.getElementById('copyBtn');
            const strengthFill = document.getElementById('strengthFill');
            const strengthLabel = document.getElementById('strengthLabel');

            // ----- Character sets -----
            const UPPER = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            const LOWER = 'abcdefghijklmnopqrstuvwxyz';
            const NUMBERS = '0123456789';
            const SYMBOLS = '!@#$%^&*()_+-=[]{}|;:,.<>?';

            // ----- Generate password -----
            function generatePassword() {
                const length = parseInt(lengthSlider.value, 10);

                // Build character pool
                let pool = '';
                if (uppercaseChk.checked) pool += UPPER;
                if (lowercaseChk.checked) pool += LOWER;
                if (numbersChk.checked) pool += NUMBERS;
                if (symbolsChk.checked) pool += SYMBOLS;

                // If nothing is checked, force lowercase
                if (pool === '') {
                    lowercaseChk.checked = true;
                    pool = LOWER;
                }

                let password = '';
                for (let i = 0; i < length; i++) {
                    const randomIndex = Math.floor(Math.random() * pool.length);
                    password += pool[randomIndex];
                }

                return password;
            }

            // ----- Update strength -----
            function updateStrength(password) {
                const len = password.length;
                let score = 0;

                // Length score
                if (len >= 8) score += 1;
                if (len >= 12) score += 1;
                if (len >= 16) score += 1;

                // Character variety
                if (/[A-Z]/.test(password)) score += 1;
                if (/[a-z]/.test(password)) score += 1;
                if (/[0-9]/.test(password)) score += 1;
                if (/[^A-Za-z0-9]/.test(password)) score += 1;

                let level, color, width;
                if (score <= 2) {
                    level = 'Weak';
                    color = '#ef4444';
                    width = '25%';
                } else if (score <= 4) {
                    level = 'Medium';
                    color = '#f59e0b';
                    width = '55%';
                } else {
                    level = 'Strong';
                    color = '#22c55e';
                    width = '100%';
                }

                strengthFill.style.width = width;
                strengthFill.style.background = color;
                strengthLabel.textContent = level;
            }

            // ----- Refresh password (generate + update UI) -----
            function refreshPassword() {
                const pwd = generatePassword();
                passwordDisplay.value = pwd;
                updateStrength(pwd);
            }

            // ----- Copy to clipboard -----
            function copyPassword() {
                const text = passwordDisplay.value;
                if (!text || text === '') {
                    alert('Generate a password first!');
                    return;
                }

                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(text)
                        .then(() => {
                            const original = copyBtn.textContent;
                            copyBtn.textContent = '✅ Copied!';
                            setTimeout(() => {
                                copyBtn.textContent = original;
                            }, 2000);
                        })
                        .catch(() => {
                            fallbackCopy(text);
                        });
                } else {
                    fallbackCopy(text);
                }
            }

            // ----- Fallback copy (for old browsers) -----
            function fallbackCopy(text) {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    document.execCommand('copy');
                    const original = copyBtn.textContent;
                    copyBtn.textContent = '✅ Copied!';
                    setTimeout(() => {
                        copyBtn.textContent = original;
                    }, 2000);
                } catch (e) {
                    alert('Unable to copy. Please select and copy manually.');
                }
                document.body.removeChild(textarea);
            }

            // ----- Event listeners -----
            generateBtn.addEventListener('click', refreshPassword);

            copyBtn.addEventListener('click', copyPassword);

            // Auto-generate on slider change
            lengthSlider.addEventListener('input', function() {
                lengthDisplay.textContent = this.value;
                refreshPassword();
            });

            // Auto-generate on checkbox change
            [uppercaseChk, lowercaseChk, numbersChk, symbolsChk].forEach(chk => {
                chk.addEventListener('change', refreshPassword);
            });

            // ----- Initial password on load -----
            refreshPassword();

        })();
    </script>

</body>
</html>
