<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BMI Calculator — Free Body Mass Index Tool</title>
    <meta name="description" content="Calculate your Body Mass Index (BMI) instantly. Free online BMI calculator for men and women with health category indicators." />
    <style>
        /* ---------- RESET & BASE ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, #0b1120 0%, #1a2332 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* ---------- CARD ---------- */
        .container {
            background: #1e293b;
            padding: 40px 35px;
            border-radius: 28px;
            max-width: 520px;
            width: 100%;
            box-shadow: 0 25px 50px -8px rgba(0, 0, 0, 0.8);
            border: 1px solid #334155;
        }

        h1 {
            color: #f1f5f9;
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h1 span {
            background: #22c55e;
            font-size: 20px;
            padding: 2px 12px;
            border-radius: 30px;
            color: #fff;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 28px;
            border-left: 4px solid #22c55e;
            padding-left: 14px;
        }

        /* ---------- UNIT TOGGLE ---------- */
        .unit-toggle {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            background: #0f172a;
            padding: 6px;
            border-radius: 14px;
            border: 1px solid #334155;
        }

        .unit-toggle button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
            background: transparent;
            color: #94a3b8;
        }

        .unit-toggle button.active {
            background: #22c55e;
            color: #fff;
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
        }

        .unit-toggle button:hover:not(.active) {
            color: #e2e8f0;
        }

        /* ---------- INPUTS ---------- */
        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;
            color: #cbd5e1;
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 6px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #334155;
            background: #0f172a;
            color: #e2e8f0;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: #22c55e;
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.15);
        }

        .input-group input::placeholder {
            color: #475569;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        /* ---------- CALCULATE BUTTON ---------- */
        .calculate-btn {
            width: 100%;
            padding: 15px;
            background: #22c55e;
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin: 8px 0 20px 0;
        }

        .calculate-btn:hover {
            background: #16a34a;
            transform: translateY(-2px);
            box-shadow: 0 12px 28px -8px rgba(34, 197, 94, 0.4);
        }

        .calculate-btn:active {
            transform: translateY(0px);
        }

        /* ---------- RESULT ---------- */
        .result-box {
            background: #0f172a;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #334155;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-box.show {
            display: block;
        }

        .bmi-number {
            font-size: 48px;
            font-weight: 800;
            color: #e2e8f0;
            text-align: center;
            letter-spacing: 1px;
        }

        .bmi-category {
            text-align: center;
            font-size: 20px;
            font-weight: 600;
            margin: 6px 0 12px 0;
        }

        .bmi-bar {
            height: 8px;
            background: #334155;
            border-radius: 10px;
            overflow: hidden;
            margin: 12px 0 8px 0;
        }

        .bmi-bar-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.6s ease, background 0.6s ease;
            width: 0%;
        }

        .bmi-range-labels {
            display: flex;
            justify-content: space-between;
            color: #64748b;
            font-size: 11px;
        }

        /* ---------- STATUS COLORS ---------- */
        .status-underweight { color: #3b82f6; }
        .status-normal { color: #22c55e; }
        .status-overweight { color: #f59e0b; }
        .status-obese { color: #ef4444; }

        .bg-underweight { background: #3b82f6; }
        .bg-normal { background: #22c55e; }
        .bg-overweight { background: #f59e0b; }
        .bg-obese { background: #ef4444; }

        /* ---------- FOOTER ---------- */
        .footer {
            margin-top: 24px;
            text-align: center;
            color: #475569;
            font-size: 12px;
            border-top: 1px solid #1e293b;
            padding-top: 18px;
        }

        /* ---------- RESPONSIVE ---------- */
        @media (max-width: 480px) {
            .container {
                padding: 24px 18px;
            }

            h1 {
                font-size: 21px;
            }

            .input-row {
                grid-template-columns: 1fr;
                gap: 0;
            }

            .bmi-number {
                font-size: 38px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- HEADER -->
        <h1>
            ⚖️ BMI <span>Calc</span>
        </h1>
        <div class="subtitle">Check your Body Mass Index instantly</div>

        <!-- UNIT TOGGLE -->
        <div class="unit-toggle">
            <button id="metricBtn" class="active">📏 Metric (kg/cm)</button>
            <button id="imperialBtn">📐 Imperial (lbs/in)</button>
        </div>

        <!-- INPUTS -->
        <div id="metricInputs">
            <div class="input-group">
                <label>Weight (kg)</label>
                <input type="number" id="weightKg" placeholder="e.g. 70" min="1" step="0.1" />
            </div>
            <div class="input-group">
                <label>Height (cm)</label>
                <input type="number" id="heightCm" placeholder="e.g. 175" min="1" step="0.1" />
            </div>
        </div>

        <div id="imperialInputs" style="display:none;">
            <div class="input-row">
                <div class="input-group">
                    <label>Weight (lbs)</label>
                    <input type="number" id="weightLbs" placeholder="e.g. 154" min="1" step="0.1" />
                </div>
                <div class="input-group">
                    <label>Height (inches)</label>
                    <input type="number" id="heightIn" placeholder="e.g. 69" min="1" step="0.1" />
                </div>
            </div>
        </div>

        <!-- CALCULATE -->
        <button class="calculate-btn" id="calculateBtn">🧮 Calculate BMI</button>

        <!-- RESULT -->
        <div class="result-box" id="resultBox">
            <div class="bmi-number" id="bmiNumber">—</div>
            <div class="bmi-category" id="bmiCategory">—</div>
            <div class="bmi-bar">
                <div class="bmi-bar-fill" id="bmiBarFill"></div>
            </div>
            <div class="bmi-range-labels">
                <span>Underweight</span>
                <span>Normal</span>
                <span>Overweight</span>
                <span>Obese</span>
            </div>
        </div>

        <div class="footer">
            💪 Stay healthy &bull; Free BMI Tool
        </div>

    </div>

    <!-- ============================================================ -->
    <!-- JAVASCRIPT -->
    <script>
        (function() {
            'use strict';

            // ----- DOM refs -----
            const metricBtn = document.getElementById('metricBtn');
            const imperialBtn = document.getElementById('imperialBtn');
            const metricInputs = document.getElementById('metricInputs');
            const imperialInputs = document.getElementById('imperialInputs');
            const weightKg = document.getElementById('weightKg');
            const heightCm = document.getElementById('heightCm');
            const weightLbs = document.getElementById('weightLbs');
            const heightIn = document.getElementById('heightIn');
            const calculateBtn = document.getElementById('calculateBtn');
            const resultBox = document.getElementById('resultBox');
            const bmiNumber = document.getElementById('bmiNumber');
            const bmiCategory = document.getElementById('bmiCategory');
            const bmiBarFill = document.getElementById('bmiBarFill');

            let currentUnit = 'metric'; // 'metric' or 'imperial'

            // ----- Unit toggle -----
            metricBtn.addEventListener('click', function() {
                metricBtn.classList.add('active');
                imperialBtn.classList.remove('active');
                metricInputs.style.display = 'block';
                imperialInputs.style.display = 'none';
                currentUnit = 'metric';
                resultBox.classList.remove('show');
                clearInputs();
            });

            imperialBtn.addEventListener('click', function() {
                imperialBtn.classList.add('active');
                metricBtn.classList.remove('active');
                imperialInputs.style.display = 'block';
                metricInputs.style.display = 'none';
                currentUnit = 'imperial';
                resultBox.classList.remove('show');
                clearInputs();
            });

            function clearInputs() {
                weightKg.value = '';
                heightCm.value = '';
                weightLbs.value = '';
                heightIn.value = '';
            }

            // ----- Calculate BMI -----
            function calculateBMI() {
                let bmi = 0;
                let weight = 0;
                let height = 0;
                let valid = true;

                if (currentUnit === 'metric') {
                    weight = parseFloat(weightKg.value);
                    height = parseFloat(heightCm.value) / 100; // convert cm to meters

                    if (isNaN(weight) || weight <= 0 || isNaN(height) || height <= 0) {
                        alert('Please enter valid weight (kg) and height (cm)');
                        valid = false;
                    } else {
                        bmi = weight / (height * height);
                    }
                } else {
                    weight = parseFloat(weightLbs.value);
                    height = parseFloat(heightIn.value);

                    if (isNaN(weight) || weight <= 0 || isNaN(height) || height <= 0) {
                        alert('Please enter valid weight (lbs) and height (inches)');
                        valid = false;
                    } else {
                        bmi = (weight / (height * height)) * 703;
                    }
                }

                if (!valid) return;

                // Round to 1 decimal
                bmi = Math.round(bmi * 10) / 10;

                // Show result
                displayResult(bmi);
            }

            // ----- Display result -----
            function displayResult(bmi) {
                let category, className, barColor, barWidth;

                if (bmi < 18.5) {
                    category = 'Underweight ⬇️';
                    className = 'status-underweight';
                    barColor = '#3b82f6';
                    barWidth = Math.min((bmi / 18.5) * 25, 25);
                } else if (bmi >= 18.5 && bmi < 25) {
                    category = 'Normal ✅';
                    className = 'status-normal';
                    barColor = '#22c55e';
                    barWidth = 25 + ((bmi - 18.5) / 6.5) * 25;
                } else if (bmi >= 25 && bmi < 30) {
                    category = 'Overweight ⚠️';
                    className = 'status-overweight';
                    barColor = '#f59e0b';
                    barWidth = 50 + ((bmi - 25) / 5) * 25;
                } else {
                    category = 'Obese ❌';
                    className = 'status-obese';
                    barColor = '#ef4444';
                    barWidth = Math.min(75 + ((bmi - 30) / 15) * 25, 100);
                }

                // Ensure bar doesn't exceed 100%
                barWidth = Math.min(barWidth, 100);

                bmiNumber.textContent = bmi;
                bmiCategory.textContent = category;
                bmiCategory.className = 'bmi-category ' + className;

                bmiBarFill.style.width = barWidth + '%';
                bmiBarFill.style.background = barColor;

                resultBox.classList.add('show');
            }

            // ----- Enter key support -----
            function handleEnter(e) {
                if (e.key === 'Enter') {
                    calculateBMI();
                }
            }

            // ----- Event listeners -----
            calculateBtn.addEventListener('click', calculateBMI);

            // Enter key on all inputs
            [weightKg, heightCm, weightLbs, heightIn].forEach(input => {
                input.addEventListener('keypress', handleEnter);
            });

            // ----- Auto-calculate on input change (optional - remove if you prefer button only) -----
            // Uncomment below for real-time calculation
            // [weightKg, heightCm, weightLbs, heightIn].forEach(input => {
            //     input.addEventListener('input', function() {
            //         if (this.value !== '') calculateBMI();
            //     });
            // });

        })();
    </script>

</body>
</html>
